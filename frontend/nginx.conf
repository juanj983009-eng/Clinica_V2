user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Servidor Dashboard SPA ────────────────────────────────────────────────
    server {
        listen       80;
        server_name  localhost;
        root         /usr/share/nginx/html;
        index        index.html;

        # ── Compresión Gzip ───────────────────────────────────────────────────
        gzip            on;
        gzip_types      text/plain text/css application/json application/javascript
                        text/javascript text/xml application/xml+rss;
        gzip_min_length 1000;
        gzip_vary       on;

        # ── Assets estáticos: caché agresiva (immutable fingerprinting de Vite) ───
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            try_files   $uri =404;
        }

        # ── Proxy SSE Stream → Backend Spring Boot ───────────────────────────
        location /api/v1/monitors/stream {
            proxy_pass         http://healthtech-backend:8082;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Directivas críticas para Server-Sent Events (SSE)
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
            add_header         X-Accel-Buffering no;
        }

        # ── Proxy API → Backend Spring Boot ──────────────────────────────────
        location /api/ {
            proxy_pass         http://healthtech-backend:8082;
            proxy_http_version 1.1;

            # Cabeceras estándar de proxy
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Cabeceras críticas para Server-Sent Events (SSE)
            # Sin estas, Nginx almacena en buffer la respuesta y rompe el stream.
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 20s;
            proxy_send_timeout 20s;
            chunked_transfer_encoding on;

            # Cabecera anti-buffering para proxies intermedios (CDN, load balancers)
            add_header         X-Accel-Buffering no;
        }

        # ── SPA Fallback: React Router catch-all ─────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # ── Seguridad: ocultar versión de Nginx ──────────────────────────────
        server_tokens off;

        # ── Cabeceras de Seguridad HTTP ───────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
